baseURL = "https://SSeung00.github.io/"
languageCode = "ko-KR"
title = "Structural Dynamics Research Log"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false

[params]
  description = "Ph.D. Student in Structural Dynamics"
  author = "Seung"
  github = "https://github.com/SSeung00"
  scholar = "https://scholar.google.com/"
  email = "you@snu.ac.kr"
  mathjax = true
  logoText = "My Daily Capture"

[languages]
  [languages.ko]
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      # Fix: **bold**한글 — closing ** before Korean particles treated as non-delimiter
      # CJK extension reclassifies CJK characters so emphasis delimiters work correctly
      [markup.goldmark.extensions.cjk]
        enable = true
        eastAsianLineBreaks = false
        escapedSpace = false
      # Fix: \;\Big|\; inside $$...$$ — Goldmark escapes backslashes before MathJax
      # Passthrough tells Goldmark not to process content between math delimiters at all
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["$$", "$$"]]
          inline = [["$", "$"]]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]
