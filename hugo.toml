baseURL = "https://SSeung00.github.io/"
languageCode = "ko-KR"
title = "Structural Dynamics Research Log"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false

[params]
  description = "Ph.D. Student in Structural Dynamics"
  author = "Seung"
  github = "https://github.com/SSeung00"
  scholar = "https://scholar.google.com/"
  email = "you@snu.ac.kr"
  mathjax = true
  logoText = "My Daily Capture"

[languages]
  [languages.ko]
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]
