<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <!-- Anti-FOUC: apply saved theme before body renders -->
    <script>
      (function () {
        var t = localStorage.getItem('blog-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}

    <!-- MathJax -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        chtml: { scale: 0.92 },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        }
      };
    </script>
    <script id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
  </head>

  <body data-section="{{ page.section | default: 'home' }}">

    <header class="site-header">
      <div class="container header-inner">

        <a class="site-logo" href="{{ '/' | relative_url }}">My Daily Capture</a>

        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}"
            {% if page.url == '/' %}class="nav-active"{% endif %}>Home</a>
          <a href="{{ '/portfolio.html' | relative_url }}"
            {% if page.section == 'research' %}class="nav-active"{% endif %}>Portfolio</a>
          <a href="{{ '/study.html' | relative_url }}"
            {% if page.section == 'study' %}class="nav-active"{% endif %}>Study</a>
          <a href="{{ '/hobby.html' | relative_url }}"
            {% if page.section == 'hobby' %}class="nav-active"{% endif %}>Hobby</a>
          <a href="{{ '/journal.html' | relative_url }}"
            {% if page.section == 'journal' %}class="nav-active"{% endif %}>Journal</a>
        </nav>

        <div class="header-controls">
          <button class="theme-toggle" id="theme-toggle"
            aria-label="Toggle light/dark mode" title="Toggle theme">
            ☀️
          </button>
        </div>

      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>© {{ "now" | date: "%Y" }} Seung · All rights reserved.</span>
        <div class="footer-links">
          <a href="https://github.com/SSeung00" target="_blank" rel="noopener noreferrer">GitHub</a>
          <a href="https://scholar.google.com/" target="_blank" rel="noopener noreferrer">Scholar</a>
          <a href="mailto:you@snu.ac.kr">Email</a>
        </div>
      </div>
    </footer>

    <script>
      // ── Theme toggle ──────────────────────────────────────────
      const html        = document.documentElement;
      const toggleBtn   = document.getElementById('theme-toggle');

      function applyTheme(theme) {
        // Animate transition
        document.body.classList.add('theme-transition');
        html.setAttribute('data-theme', theme);
        localStorage.setItem('blog-theme', theme);
        toggleBtn.textContent = theme === 'light' ? '🌙' : '☀️';
        setTimeout(() => document.body.classList.remove('theme-transition'), 350);
      }

      // Init button icon based on current theme
      const initTheme = html.getAttribute('data-theme') || 'dark';
      toggleBtn.textContent = initTheme === 'light' ? '🌙' : '☀️';

      toggleBtn.addEventListener('click', function () {
        const current = html.getAttribute('data-theme') || 'dark';
        applyTheme(current === 'light' ? 'dark' : 'light');
      });
    </script>

  </body>
</html>
