<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP: Policy Iteration / Value Iteration</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface-2: #252836;
    --border: #2e3146; --text: #e2e8f0; --text-muted: #8892a4;
    --accent: #6c8ebf; --accent-2: #bf8c6c; --success: #6cbf8e; --danger: #bf6c6c;
    --font-mono: 'Courier New', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 8px; --transition: 0.2s ease;
    --cell: 60px; --gap: 5px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 13px;
    padding: 10px 12px; margin: 0;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ── Tabs ─────────────────────────────────── */
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 5px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-2); color: var(--text-muted); cursor: pointer; font-size: 0.8rem; transition: var(--transition); user-select: none; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0f1117; font-weight: 700; }

  /* ── Status ─────────────────────────────────── */
  .status-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 12px;
    font-family: var(--font-mono); font-size: 0.76rem;
    color: var(--text-muted); min-height: 30px; line-height: 1.5;
  }
  .status-box b { color: var(--accent); font-weight: normal; }
  .status-box.phase-eval  { border-left: 3px solid var(--accent); }
  .status-box.phase-imp   { border-left: 3px solid var(--accent-2); }
  .status-box.converged   { border-left: 3px solid var(--success); }
  .status-box.converged b { color: var(--success); }

  /* ── Grid centered ──────────────────────────── */
  .grid-section { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .grid-title { font-size: 0.68rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); align-self: flex-start; }
  .grid {
    display: grid; grid-template-columns: repeat(4, var(--cell)); grid-template-rows: repeat(4, var(--cell)); gap: var(--gap);
  }
  .cell {
    width: var(--cell); height: var(--cell); border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    transition: background 0.3s, border-color 0.15s; overflow: hidden;
  }
  .cell.flash-eval { border-color: var(--accent) !important;   box-shadow: 0 0 6px rgba(108,142,191,0.3); }
  .cell.flash-imp  { border-color: var(--accent-2) !important; box-shadow: 0 0 6px rgba(191,140,108,0.3); }
  .cell .coord { position: absolute; top: 3px; left: 4px; font-size: 0.56rem; color: #3a4560; font-family: var(--font-mono); pointer-events: none; }
  .cell-arrow { font-size: 1.2rem; line-height: 1; color: var(--text-muted); pointer-events: none; transition: color 0.2s; }
  .cell-arrow.changed { color: var(--accent-2); }
  .cell-val { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); pointer-events: none; transition: color 0.2s; }
  .cell-val.updated { color: var(--text); }
  .cell.goal { background: rgba(108,191,142,0.12) !important; border-color: var(--success); }
  .cell.goal .cell-label { font-size: 1.1rem; color: var(--success); font-weight: bold; }
  .cell.goal .cell-sub { font-size: 0.6rem; color: var(--success); opacity: 0.7; }

  /* ── Stats row ───────────────────────────────── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; }
  .stat-label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .stat-val { font-size: 1.1rem; font-family: var(--font-mono); color: var(--accent); }
  .stat-val.orange { color: var(--accent-2); }
  .stat-val.green  { color: var(--success); }

  /* ── Chart ──────────────────────────────────── */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px 4px; }
  .chart-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .chart-card canvas { display: block; width: 100% !important; height: 120px !important; }

  /* ── Params ─────────────────────────────────── */
  .params-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .param-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; }
  .param-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; font-size: 0.76rem; }
  .param-name { font-family: var(--font-mono); color: var(--text); }
  .param-val { font-family: var(--font-mono); color: var(--accent); background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font-size: 0.76rem; }
  input[type=range] {
    width: 100%; accent-color: var(--accent); cursor: pointer;
    -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; }

  /* ── Controls ────────────────────────────────── */
  .controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 12px; border-radius: var(--radius); cursor: pointer;
    font-family: var(--font-sans); font-size: 0.8rem; transition: var(--transition); white-space: nowrap;
  }
  button:hover  { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #8aadd4; }
  button.success-btn { border-color: var(--success); color: var(--success); }
  button.success-btn:hover { background: rgba(108,191,142,0.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" id="tab-pi" onclick="switchMode('pi')">📋 Policy Iteration</div>
  <div class="tab"        id="tab-vi" onclick="switchMode('vi')">⚡ Value Iteration</div>
</div>

<div class="status-box" id="status">
  <b>Policy Iteration</b> 모드 — <b>1 Iteration</b>을 눌러 한 단계씩, <b>수렴까지</b>를 눌러 최적 정책을 바로 확인하세요.
</div>

<div class="grid-section">
  <div class="grid-title" id="grid-title">Policy (자동 개선)</div>
  <div class="grid" id="grid"></div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label" id="iter-label">Policy 개선</div><div class="stat-val" id="stat-iter">0</div></div>
  <div class="stat-card"><div class="stat-label">Sweeps</div><div class="stat-val orange" id="stat-sweeps">0</div></div>
  <div class="stat-card"><div class="stat-label">최대 ΔV</div><div class="stat-val" id="stat-delta">—</div></div>
  <div class="stat-card"><div class="stat-label">변경 셀</div><div class="stat-val green" id="stat-changed">—</div></div>
</div>

<div class="chart-card">
  <div class="chart-label">ΔV 수렴 곡선 (sweep별 최대 ΔV, 로그 스케일)</div>
  <canvas id="convChart"></canvas>
</div>

<div class="params-row">
  <div class="param-card">
    <div class="param-row"><span class="param-name">γ (discount)</span><span class="param-val" id="gamma-val">0.90</span></div>
    <input type="range" id="gamma-slider" min="0.1" max="0.99" step="0.01" value="0.9">
  </div>
  <div class="param-card">
    <div class="param-row"><span class="param-name">θ (수렴 기준)</span><span class="param-val" id="theta-val">0.0010</span></div>
    <input type="range" id="theta-slider" min="-4" max="-1" step="0.5" value="-3">
  </div>
</div>

<div class="controls">
  <button class="primary" id="btn-iter"  onclick="doIteration()">1 Iteration</button>
  <button class="success-btn" id="btn-conv" onclick="runToConverge()">수렴까지 실행</button>
  <button id="btn-reset" onclick="resetAll()">↺ 초기화</button>
</div>

<script>
  const ROWS=4,COLS=4,GOAL=[3,3];
  const DIRS=[[-1,0],[0,1],[1,0],[0,-1]];
  const ARROWS=['↑','→','↓','←'];
  let mode='pi',values=[],policy=[],gamma=0.9,theta=0.001;
  let iterCount=0,sweepCount=0,deltaHistory=[],isAnimating=false;

  function isGoal(r,c){return r===GOAL[0]&&c===GOAL[1];}
  function getNext(r,c,dir){return[Math.max(0,Math.min(ROWS-1,r+DIRS[dir][0])),Math.max(0,Math.min(COLS-1,c+DIRS[dir][1]))];}
  function qValue(r,c,dir){if(isGoal(r,c))return 0;const[nr,nc]=getNext(r,c,dir);return-1+gamma*values[nr][nc];}
  function bestAction(r,c){if(isGoal(r,c))return 0;let best=-Infinity,bestDir=0;for(let d=0;d<4;d++){const q=qValue(r,c,d);if(q>best){best=q;bestDir=d;}}return bestDir;}

  function initAll(){
    values=Array.from({length:ROWS},()=>new Float64Array(COLS));
    policy=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>{if(isGoal(r,c))return 1;return c<COLS-1?1:2;}));
    iterCount=0;sweepCount=0;deltaHistory=[];
    updateStats(0,0);
    convChart.data.labels=[];convChart.data.datasets[0].data=[];convChart.update();
  }

  function evalSweep(){
    const newV=Array.from({length:ROWS},()=>new Float64Array(COLS));let maxDelta=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      newV[r][c]=isGoal(r,c)?0:qValue(r,c,policy[r][c]);
      maxDelta=Math.max(maxDelta,Math.abs(newV[r][c]-values[r][c]));
    }
    values=newV;sweepCount++;return maxDelta;
  }

  function policyImprove(){
    let changed=0;const changedCells=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(isGoal(r,c))continue;const best=bestAction(r,c);
      if(best!==policy[r][c]){policy[r][c]=best;changed++;changedCells.push([r,c]);}
    }
    iterCount++;return{changed,changedCells};
  }

  function viSweep(){
    const newV=Array.from({length:ROWS},()=>new Float64Array(COLS));let maxDelta=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(isGoal(r,c)){newV[r][c]=0;continue;}
      let best=-Infinity;for(let d=0;d<4;d++)best=Math.max(best,qValue(r,c,d));
      newV[r][c]=best;maxDelta=Math.max(maxDelta,Math.abs(newV[r][c]-values[r][c]));
    }
    values=newV;sweepCount++;iterCount=sweepCount;return maxDelta;
  }

  function extractPolicy(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!isGoal(r,c))policy[r][c]=bestAction(r,c);}

  async function doIteration(){
    if(isAnimating)return;isAnimating=true;setButtons(false);
    if(mode==='pi'){
      setStatus('Phase 1: Policy Evaluation...','phase-eval');
      let delta=Infinity,evalIter=0;
      while(delta>theta&&evalIter<200){delta=evalSweep();deltaHistory.push(delta);evalIter++;if(evalIter%3===0){await flashAll('flash-eval',12);updateAllCells();updateCellColors();updateChart();}await sleep(0);}
      await flashAll('flash-eval',18);updateAllCells();updateCellColors();updateChart();
      setStatus('Phase 2: Policy Improvement...','phase-imp');await sleep(60);
      const{changed,changedCells}=policyImprove();
      for(const[r,c]of changedCells){document.getElementById(`cell-${r}-${c}`)?.classList.add('flash-imp');updateArrow(r,c,true);}
      await sleep(300);
      for(const[r,c]of changedCells){document.getElementById(`cell-${r}-${c}`)?.classList.remove('flash-imp');updateArrow(r,c,false);}
      updateStats(delta,changed);
      if(changed===0)setStatus(`<b>수렴 완료!</b> Policy가 더 이상 바뀌지 않습니다. (${iterCount}번 개선, ${sweepCount} sweeps)`,'converged');
      else setStatus(`Iteration ${iterCount} 완료 — Policy ${changed}개 셀 변경, ΔV=${delta.toFixed(5)}`,'phase-imp');
    } else {
      const delta=viSweep();deltaHistory.push(delta);extractPolicy();
      await flashAll('flash-eval',22);updateAllCells();updateCellColors();updateChart();updateStats(delta,0);
      if(delta<theta)setStatus(`<b>수렴 완료!</b> (${sweepCount} sweeps, ΔV=${delta.toExponential(2)}) — 최적 Policy 추출 완료`,'converged');
      else setStatus(`Sweep ${sweepCount} 완료 — 최대 ΔV: <b>${delta.toFixed(5)}</b>`,'phase-eval');
    }
    isAnimating=false;setButtons(true);
  }

  async function runToConverge(){
    if(isAnimating)return;isAnimating=true;setButtons(false);setStatus('수렴할 때까지 실행 중...');
    if(mode==='pi'){
      let stable=false;
      while(!stable){
        let delta=Infinity,evalIter=0;
        while(delta>theta&&evalIter<300){delta=evalSweep();deltaHistory.push(delta);evalIter++;}
        const{changed}=policyImprove();if(changed===0)stable=true;
        updateAllCells();updateCellColors();updateChart();updateStats(delta,changed);await sleep(0);
      }
      setStatus(`<b>수렴 완료!</b> 최적 Policy 도달. (${iterCount}번 개선, ${sweepCount} sweeps)`,'converged');
    } else {
      let delta=Infinity;
      while(delta>theta){delta=viSweep();deltaHistory.push(delta);if(sweepCount%5===0){updateAllCells();updateCellColors();updateChart();await sleep(0);}}
      extractPolicy();updateAllCells();updateCellColors();updateChart();updateStats(delta,0);
      setStatus(`<b>수렴 완료!</b> (${sweepCount} sweeps, 최종 ΔV=${delta.toExponential(2)})`,'converged');
    }
    isAnimating=false;setButtons(true);
  }

  function switchMode(m){
    if(isAnimating)return;mode=m;
    document.getElementById('tab-pi').classList.toggle('active',m==='pi');
    document.getElementById('tab-vi').classList.toggle('active',m==='vi');
    document.getElementById('iter-label').textContent=m==='pi'?'Policy 개선':'Value Sweeps';
    document.getElementById('grid-title').textContent=m==='pi'?'Policy (자동 개선)':'Greedy Policy (from V*)';
    setStatus(m==='pi'?'<b>Policy Iteration</b> 모드 — 1 Iteration을 눌러 한 단계씩 보세요.':'<b>Value Iteration</b> 모드 — 매 Sweep마다 V*(s) = max_a Q(s,a) 로 업데이트합니다.');
    initAll();buildGrid();
  }

  function resetAll(){if(isAnimating)return;initAll();buildGrid();setStatus(mode==='pi'?'<b>Policy Iteration</b> 모드 — 1 Iteration을 눌러 한 단계씩 보세요.':'<b>Value Iteration</b> 모드 — 1 Iteration을 눌러 한 단계씩 보세요.');}

  function buildGrid(){
    const grid=document.getElementById('grid');grid.innerHTML='';
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');cell.className='cell'+(isGoal(r,c)?' goal':'');cell.id=`cell-${r}-${c}`;
      const coord=document.createElement('div');coord.className='coord';coord.textContent=`${r},${c}`;cell.appendChild(coord);
      if(isGoal(r,c)){cell.innerHTML+='<span class="cell-label">G</span><span class="cell-sub">V=0</span>';cell.querySelector('.coord').textContent='3,3';}
      else{const arr=document.createElement('div');arr.className='cell-arrow';arr.id=`arrow-${r}-${c}`;arr.textContent=ARROWS[policy[r][c]];
        const val=document.createElement('div');val.className='cell-val';val.id=`val-${r}-${c}`;val.textContent='0.0';
        cell.appendChild(arr);cell.appendChild(val);}
      grid.appendChild(cell);
    }
  }

  function updateArrow(r,c,highlight){const el=document.getElementById(`arrow-${r}-${c}`);if(!el)return;el.textContent=ARROWS[policy[r][c]];el.className='cell-arrow'+(highlight?' changed':'');}
  function updateCellVal(r,c){const el=document.getElementById(`val-${r}-${c}`);if(!el)return;const v=values[r][c];el.textContent=v.toFixed(1);el.className='cell-val'+(v!==0?' updated':'');}
  function updateAllCells(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!isGoal(r,c)){updateCellVal(r,c);updateArrow(r,c,false);}}
  function updateCellColors(){
    let minV=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!isGoal(r,c))minV=Math.min(minV,values[r][c]);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(isGoal(r,c))continue;const cell=document.getElementById(`cell-${r}-${c}`);const v=values[r][c];
      if(minV===0){cell.style.background='';continue;}
      const ratio=v/minV;const rr=Math.round(108+(191-108)*ratio),gg=Math.round(142+(108-142)*ratio),bb=Math.round(191+(108-191)*ratio);
      cell.style.background=`rgba(${rr},${gg},${bb},0.22)`;
    }
  }

  async function flashAll(cls,ms){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!isGoal(r,c))document.getElementById(`cell-${r}-${c}`)?.classList.add(cls);
    await sleep(ms);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(!isGoal(r,c))document.getElementById(`cell-${r}-${c}`)?.classList.remove(cls);
  }

  function updateStats(delta,changed){
    document.getElementById('stat-iter').textContent=iterCount;
    document.getElementById('stat-sweeps').textContent=sweepCount;
    document.getElementById('stat-delta').textContent=delta>0?(delta<0.0001?delta.toExponential(2):delta.toFixed(4)):'—';
    document.getElementById('stat-changed').textContent=changed>0?changed+'개':(sweepCount>0?'없음':'—');
  }

  function setStatus(html,cls=''){const el=document.getElementById('status');el.innerHTML=html;el.className='status-box'+(cls?' '+cls:'');}
  function setButtons(en){['btn-iter','btn-conv','btn-reset'].forEach(id=>document.getElementById(id).disabled=!en);}
  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

  Chart.defaults.color='#8892a4';Chart.defaults.borderColor='#2e3146';
  const convChart=new Chart(document.getElementById('convChart').getContext('2d'),{
    type:'line',
    data:{labels:[],datasets:[{label:'max |ΔV|',data:[],borderColor:'#6c8ebf',backgroundColor:'rgba(108,142,191,0.08)',borderWidth:1.5,pointRadius:0,fill:true,tension:0.2}]},
    options:{responsive:false,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false}},
      scales:{x:{title:{display:true,text:'Sweep',color:'#8892a4',font:{size:10}},grid:{color:'#2e3146'},ticks:{font:{size:9},maxTicksLimit:8}},
              y:{type:'logarithmic',title:{display:true,text:'max |ΔV|',color:'#8892a4',font:{size:10}},grid:{color:'#2e3146'},ticks:{font:{size:9}}}}}
  });

  function updateChart(){convChart.data.labels=deltaHistory.map((_,i)=>i+1);convChart.data.datasets[0].data=deltaHistory.map(v=>Math.max(v,1e-10));convChart.update();}

  document.getElementById('gamma-slider').addEventListener('input',function(){gamma=parseFloat(this.value);document.getElementById('gamma-val').textContent=gamma.toFixed(2);initAll();buildGrid();});
  document.getElementById('theta-slider').addEventListener('input',function(){theta=Math.pow(10,parseFloat(this.value));document.getElementById('theta-val').textContent=theta.toFixed(4);});

  initAll();buildGrid();
</script>
<script>
(function(){
  function sendH(){window.parent.postMessage({type:'sim-resize',h:document.documentElement.scrollHeight},'*');}
  if(window.ResizeObserver){new ResizeObserver(sendH).observe(document.documentElement);}
  window.addEventListener('load',sendH); sendH();
})();
</script>
</body>
</html>
