<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gridworld — Random Walk</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface-2: #252836;
    --border: #2e3146; --text: #e2e8f0; --text-muted: #8892a4;
    --accent: #6c8ebf; --accent-2: #bf8c6c; --success: #6cbf8e; --danger: #bf6c6c;
    --font-mono: 'Courier New', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 8px; --transition: 0.2s ease;
    --cell: 60px; --gap: 5px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 13px;
    padding: 10px 12px; margin: 0;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ── Status ─────────────────────────────────── */
  .status-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 12px;
    font-family: var(--font-mono); font-size: 0.76rem;
    color: var(--text-muted); min-height: 30px; line-height: 1.5;
  }
  .status-box b { color: var(--accent); font-weight: normal; }

  /* ── Grid centered ──────────────────────────── */
  .grid-section {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .grid-title {
    font-size: 0.68rem; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--text-muted); align-self: flex-start;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, var(--cell));
    grid-template-rows:    repeat(4, var(--cell));
    gap: var(--gap); position: relative;
  }
  .cell {
    width: var(--cell); height: var(--cell);
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; font-size: 0.7rem;
    color: var(--text-muted); transition: background 0.15s;
  }
  .cell .coord {
    position: absolute; top: 3px; left: 4px;
    font-size: 0.56rem; color: #3a4560;
    font-family: var(--font-mono); pointer-events: none;
  }
  .cell .step-count {
    font-size: 0.82rem; color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .cell.start { border-color: rgba(108,142,191,0.4); }
  .cell.start .cell-label { font-size: 0.8rem; color: var(--accent); font-weight: bold; }
  .cell.goal { background: rgba(108,191,142,0.12) !important; border-color: var(--success); }
  .cell.goal .cell-label { font-size: 1.1rem; color: var(--success); font-weight: bold; }
  .cell.goal .cell-sub { font-size: 0.6rem; color: var(--success); opacity: 0.7; }

  /* Agent */
  .agent {
    position: absolute; width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px rgba(108,142,191,0.6);
    pointer-events: none; z-index: 10; display: flex; align-items: center;
    justify-content: center; font-size: 13px;
    transition: top 0.16s ease, left 0.16s ease;
  }

  /* ── Stats row — 4 cards ─────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 10px;
  }
  .stat-label { font-size: 0.63rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
  .stat-value { font-size: 1.2rem; font-family: var(--font-mono); color: var(--accent); line-height: 1; }
  .stat-value.warning { color: var(--accent-2); }
  .stat-value.good    { color: var(--success); }

  /* ── Optimal note ────────────────────────────── */
  .optimal-note {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent-2); border-radius: var(--radius);
    padding: 7px 12px; font-size: 0.74rem; color: var(--text-muted); line-height: 1.6;
  }
  .optimal-note b { color: var(--accent-2); }

  /* ── Histogram ───────────────────────────────── */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 10px 6px;
  }
  .chart-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .chart-card canvas { display: block; width: 100% !important; height: 130px !important; }

  /* ── Controls ────────────────────────────────── */
  .controls {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  button {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 12px; border-radius: var(--radius);
    cursor: pointer; font-family: var(--font-sans); font-size: 0.8rem;
    transition: var(--transition); white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 600; }
  button.secondary { border-color: var(--accent-2); color: var(--accent-2); }
  button.secondary:hover { background: rgba(191,140,108,0.12); }
  .speed-group {
    display: flex; align-items: center; gap: 5px;
    color: var(--text-muted); font-size: 0.73rem; margin-left: auto;
  }
  input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }
</style>
</head>
<body>

<div class="status-box" id="status">시뮬레이터가 준비되었습니다. ▶ 자동 실행 또는 1 Step을 눌러 시작하세요.</div>

<div class="grid-section">
  <div class="grid-title">4 × 4 Gridworld</div>
  <div class="grid" id="grid">
    <div class="agent" id="agent">🤖</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label">에피소드</div><div class="stat-value" id="stat-ep">0</div></div>
  <div class="stat-card"><div class="stat-label">현재 Steps</div><div class="stat-value warning" id="stat-cur">0</div></div>
  <div class="stat-card"><div class="stat-label">평균 Steps</div><div class="stat-value good" id="stat-avg">—</div></div>
  <div class="stat-card"><div class="stat-label">최단 기록</div><div class="stat-value" id="stat-min">—</div></div>
</div>

<div class="optimal-note">
  최적 경로: <b>6 steps</b> (Manhattan 거리) &nbsp;|&nbsp; Random Walk 평균은 얼마나 될까?
</div>

<div class="chart-card">
  <div class="chart-label">에피소드 길이 분포 (Step 수)</div>
  <canvas id="histChart"></canvas>
</div>

<div class="controls">
  <button onclick="doStep()">1 Step</button>
  <button onclick="doEpisode()">1 Episode</button>
  <button class="secondary" onclick="do100Episodes()">100 Episodes</button>
  <button id="btnAuto" onclick="toggleAuto()">▶ 자동 실행</button>
  <button onclick="resetAll()">↺ 초기화</button>
  <div class="speed-group">
    <span>속도</span>
    <input type="range" id="speedSlider" min="50" max="800" step="50" value="250">
    <span id="speedLabel">250ms</span>
  </div>
</div>

<script>
  const ROWS = 4, COLS = 4, GOAL = [3,3], START = [0,0];
  const ACTIONS = [[-1,0],[1,0],[0,-1],[0,1]];

  let agentRow = 0, agentCol = 0, curSteps = 0;
  let episodeCount = 0, totalSteps = 0, episodeLengths = [];
  let visitCounts = [], totalVisits = [];
  let isRunning = false, autoTimer = null, batchMode = false;

  function isGoal(r,c) { return r===GOAL[0]&&c===GOAL[1]; }

  function initState() {
    agentRow = START[0]; agentCol = START[1]; curSteps = 0;
    visitCounts = Array.from({length:ROWS},()=>new Array(COLS).fill(0));
    visitCounts[agentRow][agentCol]++;
  }

  function randomStep() {
    const act = ACTIONS[Math.floor(Math.random()*4)];
    agentRow = Math.max(0,Math.min(ROWS-1,agentRow+act[0]));
    agentCol = Math.max(0,Math.min(COLS-1,agentCol+act[1]));
    curSteps++; visitCounts[agentRow][agentCol]++; totalVisits[agentRow][agentCol]++;
    return isGoal(agentRow,agentCol);
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    const agent = document.getElementById('agent');
    grid.innerHTML = ''; grid.appendChild(agent);
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      const cell = document.createElement('div');
      cell.className = 'cell'; cell.id = `cell-${r}-${c}`;
      const coord = document.createElement('div');
      coord.className = 'coord'; coord.textContent = `${r},${c}`; cell.appendChild(coord);
      if (isGoal(r,c)) {
        cell.classList.add('goal');
        cell.innerHTML += '<span class="cell-label">G</span><span class="cell-sub">Goal</span>';
        cell.querySelector('.coord').textContent = '3,3';
      } else if (r===START[0]&&c===START[1]) {
        cell.classList.add('start');
        const lbl = document.createElement('span'); lbl.className='cell-label'; lbl.textContent='S'; cell.appendChild(lbl);
      } else {
        const cnt = document.createElement('div'); cnt.className='step-count'; cnt.id=`cnt-${r}-${c}`; cell.appendChild(cnt);
      }
      grid.appendChild(cell);
    }
  }

  function cellTopLeft(r,c) {
    const sz=60, gp=5;
    return { top: r*(sz+gp)+(sz-26)/2, left: c*(sz+gp)+(sz-26)/2 };
  }

  function updateAgentDOM() {
    const a=document.getElementById('agent'), pos=cellTopLeft(agentRow,agentCol);
    a.style.top=pos.top+'px'; a.style.left=pos.left+'px';
  }

  function updateHeatmap() {
    if (!episodeLengths.length) return;
    const maxV = Math.max(...totalVisits.flat())||1;
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      if (isGoal(r,c)) continue;
      const cell=document.getElementById(`cell-${r}-${c}`); if(!cell) continue;
      const ratio=totalVisits[r][c]/maxV;
      cell.style.background=`rgba(108,142,191,${ratio*0.5})`;
      const cnt=document.getElementById(`cnt-${r}-${c}`);
      if (cnt) cnt.textContent=totalVisits[r][c]>0?totalVisits[r][c]:'';
    }
  }

  function updateStats() {
    document.getElementById('stat-ep').textContent=episodeCount;
    document.getElementById('stat-cur').textContent=curSteps;
    if (episodeLengths.length>0) {
      document.getElementById('stat-avg').textContent=(totalSteps/episodeLengths.length).toFixed(1);
      document.getElementById('stat-min').textContent=Math.min(...episodeLengths);
    }
  }

  function setStatus(html) { document.getElementById('status').innerHTML=html; }

  Chart.defaults.color='#8892a4'; Chart.defaults.borderColor='#2e3146';
  const histChart = new Chart(document.getElementById('histChart').getContext('2d'),{
    type:'bar', data:{labels:[],datasets:[{label:'Episode 수',data:[],
      backgroundColor:'rgba(108,142,191,0.5)',borderColor:'#6c8ebf',borderWidth:1,borderRadius:3}]},
    options:{responsive:false,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>`${ctx[0].label} steps`,label:ctx=>`${ctx.raw}회`}}},
      scales:{x:{title:{display:true,text:'Steps per Episode',color:'#8892a4',font:{size:10}},
                  grid:{color:'#2e3146'},ticks:{font:{size:9},color:'#8892a4'}},
              y:{title:{display:true,text:'횟수',color:'#8892a4',font:{size:10}},
                  grid:{color:'#2e3146'},ticks:{font:{size:9},color:'#8892a4',stepSize:1}}}}
  });

  function updateHistogram() {
    if (!episodeLengths.length) return;
    const maxLen=Math.max(...episodeLengths);
    const binSize=maxLen<=100?10:maxLen<=300?20:maxLen<=600?50:100;
    const numBins=Math.ceil(maxLen/binSize)+1;
    const counts=new Array(numBins).fill(0);
    for (const len of episodeLengths) counts[Math.min(Math.floor(len/binSize),numBins-1)]++;
    histChart.data.labels=counts.map((_,i)=>`${i*binSize}–${(i+1)*binSize-1}`);
    histChart.data.datasets[0].data=counts; histChart.update();
  }

  function onEpisodeEnd() {
    episodeCount++; totalSteps+=curSteps; episodeLengths.push(curSteps);
    const avg=(totalSteps/episodeLengths.length).toFixed(1);
    setStatus(`에피소드 <b>${episodeCount}</b> 완료 — <b>${curSteps}</b> steps &nbsp;|&nbsp; 지금까지 평균: <b>${avg}</b> steps`);
    if (!batchMode) updateHeatmap();
    updateHistogram(); updateStats();
    initState(); if (!batchMode) updateAgentDOM();
  }

  function doStep() {
    const done=randomStep(); updateAgentDOM(); updateStats();
    if (done) onEpisodeEnd();
    else setStatus(`에피소드 <b>${episodeCount+1}</b> 진행 중 — Step <b>${curSteps}</b> &nbsp;|&nbsp; 현재 (${agentRow},${agentCol})`);
  }

  function doEpisode() {
    let done=false; while(!done) done=randomStep();
    updateAgentDOM(); onEpisodeEnd();
  }

  function do100Episodes() {
    batchMode=true;
    for (let i=0;i<100;i++) {
      let done=false;
      while(!done) done=randomStep();
      episodeCount++; totalSteps+=curSteps; episodeLengths.push(curSteps);
      for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) totalVisits[r][c]+=visitCounts[r][c];
      initState();
    }
    batchMode=false;
    updateHeatmap(); updateHistogram(); updateStats(); updateAgentDOM();
    const avg=(totalSteps/episodeLengths.length).toFixed(1);
    setStatus(`<b>100 에피소드</b> 일괄 실행 완료 (누계 ${episodeCount}회) &nbsp;|&nbsp; 전체 평균: <b>${avg}</b> steps`);
  }

  function toggleAuto() {
    if (isRunning) {
      clearInterval(autoTimer); autoTimer=null; isRunning=false;
      document.getElementById('btnAuto').textContent='▶ 자동 실행';
      document.getElementById('btnAuto').classList.remove('active');
    } else {
      isRunning=true;
      document.getElementById('btnAuto').textContent='⏸ 일시정지';
      document.getElementById('btnAuto').classList.add('active');
      autoTimer=setInterval(doStep,parseInt(document.getElementById('speedSlider').value));
    }
  }

  function resetAll() {
    if (isRunning) { clearInterval(autoTimer); autoTimer=null; isRunning=false;
      document.getElementById('btnAuto').textContent='▶ 자동 실행';
      document.getElementById('btnAuto').classList.remove('active'); }
    episodeCount=0; totalSteps=0; episodeLengths=[];
    totalVisits=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
    initState(); buildGrid(); updateAgentDOM(); updateStats();
    histChart.data.labels=[]; histChart.data.datasets[0].data=[]; histChart.update();
    document.getElementById('stat-avg').textContent='—';
    document.getElementById('stat-min').textContent='—';
    setStatus('시뮬레이터가 초기화되었습니다. ▶ 자동 실행 또는 1 Step을 눌러 시작하세요.');
  }

  document.getElementById('speedSlider').addEventListener('input',function(){
    document.getElementById('speedLabel').textContent=this.value+'ms';
    if (isRunning) { clearInterval(autoTimer); autoTimer=setInterval(doStep,parseInt(this.value)); }
  });

  totalVisits=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
  initState(); buildGrid(); updateAgentDOM();
</script>
</body>
</html>
