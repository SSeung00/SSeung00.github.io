<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10-Armed Bandit Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #252836;
    --border: #2e3146;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --accent: #6c8ebf;
    --accent-2: #bf8c6c;
    --success: #6cbf8e;
    --danger: #bf6c6c;
    --font-mono: 'Courier New', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 8px;
    --transition: 0.2s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 0.82rem;
    margin: 0;
    overflow: hidden;
    height: 580px;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 6px;
  }

  .status-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    min-height: 32px;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .status-box span { color: var(--accent); }

  .charts-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    flex: 1;
    min-height: 0;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px 4px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .chart-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 3px;
    flex-shrink: 0;
  }
  .chart-card canvas { flex: 1; min-height: 0; }

  .chart-line-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px 4px;
    display: flex;
    flex-direction: column;
    flex: 0 0 120px;
    min-height: 0;
  }
  .chart-line-card canvas { flex: 1; min-height: 0; }

  .controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    transition: var(--transition);
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .speed-group {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
    font-size: 0.75rem;
  }
  input[type=range] { width: 90px; accent-color: var(--accent); cursor: pointer; }
</style>
</head>
<body>

<div class="status-box" id="statusBox">시뮬레이터가 초기화되었습니다. 버튼을 눌러 시작하세요.</div>

<div class="charts-top">
  <div class="chart-card">
    <div class="chart-label">추정 Q(a)</div>
    <canvas id="qChart"></canvas>
  </div>
  <div class="chart-card">
    <div class="chart-label">선택 횟수 N(a)</div>
    <canvas id="nChart"></canvas>
  </div>
</div>

<div class="chart-line-card">
  <div class="chart-label">평균 보상 (Running Average)</div>
  <canvas id="rewardChart"></canvas>
</div>

<div class="controls">
  <button onclick="doSteps(1)">1 Step</button>
  <button onclick="doSteps(100)">100 Steps</button>
  <button onclick="doEpisode()">1 Episode</button>
  <button id="btnAuto" onclick="toggleAuto()">▶ 자동 실행</button>
  <button onclick="resetSim()">↺ 초기화</button>
  <button id="btnReveal" onclick="toggleReveal()">🎯 정답 공개</button>
  <div class="speed-group">
    <span>속도</span>
    <input type="range" id="speedSlider" min="50" max="1000" step="50" value="300">
    <span id="speedLabel">300ms</span>
  </div>
</div>

<script>
  Chart.defaults.color = '#8892a4';
  Chart.defaults.borderColor = '#2e3146';

  const NUM_ARMS = 10;
  const EPISODE_STEPS = 1000;

  let trueMeans = [], Q = [], N = [];
  let totalSteps = 0, totalReward = 0, rewardHistory = [];
  let lastChosen = -1, isRunning = false, autoInterval = null, revealActive = false;

  function boxMuller() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  }
  function randNormal(mu, sigma) { return mu + sigma * boxMuller(); }

  function initSim() {
    trueMeans = Array.from({ length: NUM_ARMS }, () => randNormal(0, 1));
    Q = new Array(NUM_ARMS).fill(0);
    N = new Array(NUM_ARMS).fill(0);
    totalSteps = 0; totalReward = 0; rewardHistory = []; lastChosen = -1;
    revealActive = false;
    document.getElementById('btnReveal').textContent = '🎯 정답 공개';
    document.getElementById('btnReveal').classList.remove('active');
    updateStatus('시뮬레이터가 초기화되었습니다. 버튼을 눌러 시작하세요.', false);
    updateAllCharts();
  }

  function greedySelect() {
    let maxQ = -Infinity, ties = [];
    for (let i = 0; i < NUM_ARMS; i++) {
      if (Q[i] > maxQ) { maxQ = Q[i]; ties = [i]; }
      else if (Q[i] === maxQ) { ties.push(i); }
    }
    return ties[Math.floor(Math.random() * ties.length)];
  }

  function step() {
    const a = greedySelect();
    const r = randNormal(trueMeans[a], 1);
    N[a]++; Q[a] += (r - Q[a]) / N[a];
    totalSteps++; totalReward += r;
    rewardHistory.push(totalReward / totalSteps);
    lastChosen = a;
    return { a, r };
  }

  function doSteps(count) {
    let last;
    for (let i = 0; i < count; i++) {
      if (totalSteps >= EPISODE_STEPS * 10) break;
      last = step();
    }
    if (last) {
      updateStatus(`머신 <span>${last.a + 1}</span>을 선택했습니다. &nbsp;보상: <span>${last.r.toFixed(3)}</span> &nbsp;|&nbsp; Q(${last.a + 1}) = <span>${Q[last.a].toFixed(3)}</span> &nbsp;|&nbsp; 총 Step: <span>${totalSteps}</span>`, true);
    }
    updateAllCharts();
  }

  function doEpisode() {
    const rem = EPISODE_STEPS - (totalSteps % EPISODE_STEPS || EPISODE_STEPS);
    doSteps(rem === 0 ? EPISODE_STEPS : rem);
  }

  function toggleAuto() {
    if (isRunning) {
      clearInterval(autoInterval); autoInterval = null; isRunning = false;
      document.getElementById('btnAuto').textContent = '▶ 자동 실행';
      document.getElementById('btnAuto').classList.remove('active');
    } else {
      isRunning = true;
      document.getElementById('btnAuto').textContent = '⏸ 일시정지';
      document.getElementById('btnAuto').classList.add('active');
      autoInterval = setInterval(() => {
        doSteps(1);
        if (totalSteps >= EPISODE_STEPS) {
          clearInterval(autoInterval); autoInterval = null; isRunning = false;
          document.getElementById('btnAuto').textContent = '▶ 자동 실행';
          document.getElementById('btnAuto').classList.remove('active');
        }
      }, parseInt(document.getElementById('speedSlider').value));
    }
  }

  function resetSim() {
    if (isRunning) {
      clearInterval(autoInterval); autoInterval = null; isRunning = false;
      document.getElementById('btnAuto').textContent = '▶ 자동 실행';
      document.getElementById('btnAuto').classList.remove('active');
    }
    initSim();
  }

  function toggleReveal() {
    revealActive = !revealActive;
    const btn = document.getElementById('btnReveal');
    btn.textContent = revealActive ? '🙈 정답 숨기기' : '🎯 정답 공개';
    revealActive ? btn.classList.add('active') : btn.classList.remove('active');
    updateQChart();
  }

  function updateStatus(msg, isHTML) {
    const el = document.getElementById('statusBox');
    isHTML ? (el.innerHTML = msg) : (el.textContent = msg);
  }

  document.getElementById('speedSlider').addEventListener('input', function() {
    document.getElementById('speedLabel').textContent = this.value + 'ms';
    if (isRunning) {
      clearInterval(autoInterval);
      autoInterval = setInterval(() => {
        doSteps(1);
        if (totalSteps >= EPISODE_STEPS) {
          clearInterval(autoInterval); autoInterval = null; isRunning = false;
          document.getElementById('btnAuto').textContent = '▶ 자동 실행';
          document.getElementById('btnAuto').classList.remove('active');
        }
      }, parseInt(this.value));
    }
  });

  const labels = Array.from({ length: NUM_ARMS }, (_, i) => `M${i + 1}`);

  const qChart = new Chart(document.getElementById('qChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Q(a)', data: new Array(NUM_ARMS).fill(0),
        backgroundColor: Array(NUM_ARMS).fill('rgba(108,142,191,0.5)'),
        borderColor: Array(NUM_ARMS).fill('rgba(108,142,191,0.8)'), borderWidth: 1 }]
    },
    options: { responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index' } },
      scales: { x: { grid: { color: '#2e3146' }, ticks: { font: { size: 10 } } },
                y: { grid: { color: '#2e3146' }, ticks: { font: { size: 10 } } } } }
  });

  const nChart = new Chart(document.getElementById('nChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'N(a)', data: new Array(NUM_ARMS).fill(0),
        backgroundColor: 'rgba(108,142,191,0.5)', borderColor: 'rgba(108,142,191,0.8)', borderWidth: 1 }]
    },
    options: { responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false } },
      scales: { x: { grid: { color: '#2e3146' }, ticks: { font: { size: 10 } } },
                y: { grid: { color: '#2e3146' }, ticks: { font: { size: 10 } } } } }
  });

  const rewardChart = new Chart(document.getElementById('rewardChart').getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: '평균 보상', data: [],
        borderColor: '#6c8ebf', backgroundColor: 'rgba(108,142,191,0.08)',
        borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.2 }] },
    options: { responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false } },
      scales: { x: { grid: { color: '#2e3146' }, ticks: { font: { size: 9 }, maxTicksLimit: 8 } },
                y: { grid: { color: '#2e3146' }, ticks: { font: { size: 10 } } } } }
  });

  function updateQChart() {
    const bgColors = Array.from({ length: NUM_ARMS }, (_, i) =>
      i === lastChosen ? 'rgba(108,142,191,1)' : 'rgba(108,142,191,0.45)');
    qChart.data.datasets[0].data = [...Q];
    qChart.data.datasets[0].backgroundColor = bgColors;

    if (revealActive) {
      const bestArm = trueMeans.indexOf(Math.max(...trueMeans));
      const trueDataset = {
        label: 'True μ(a)', data: [...trueMeans], type: 'line',
        borderColor: '#bf8c6c', backgroundColor: 'transparent',
        borderWidth: 1.5, borderDash: [4, 3], tension: 0, order: 0,
        pointRadius: trueMeans.map((_, i) => i === bestArm ? 5 : 0),
        pointBackgroundColor: trueMeans.map((_, i) => i === bestArm ? '#bf8c6c' : 'transparent'),
      };
      if (qChart.data.datasets.length < 2) qChart.data.datasets.push(trueDataset);
      else Object.assign(qChart.data.datasets[1], trueDataset);
    } else {
      if (qChart.data.datasets.length > 1) qChart.data.datasets.splice(1);
    }
    qChart.update();
  }

  function updateAllCharts() {
    updateQChart();
    nChart.data.datasets[0].data = [...N];
    nChart.update();

    const maxPts = 500;
    const skip = Math.max(1, Math.ceil(rewardHistory.length / maxPts));
    const labels = [], data = [];
    for (let i = 0; i < rewardHistory.length; i += skip) { labels.push(i + 1); data.push(rewardHistory[i]); }
    rewardChart.data.labels = labels;
    rewardChart.data.datasets[0].data = data;
    rewardChart.update();
  }

  initSim();
</script>
</body>
</html>
